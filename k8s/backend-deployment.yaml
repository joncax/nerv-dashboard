apiVersion: apps/v1
kind: Deployment
metadata:
  name: nerv-dashboard-backend
  namespace: nerv-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nerv-dashboard-backend
  template:
    metadata:
      labels:
        app: nerv-dashboard-backend
    spec:
      serviceAccountName: nerv-dashboard-sa
      containers:
        - name: backend
          image: nerv-dashboard-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: HOST_PROC
              value: "/host/proc"
            - name: HOST_DISK_MYBOOK
              value: "/mnt/MyBook500GB"
            - name: HOST_DISK_PASSPORT
              value: "/mnt/Passport2TB"
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-mybook
              mountPath: /mnt/MyBook500GB
              readOnly: true
            - name: host-passport
              mountPath: /mnt/Passport2TB
              readOnly: true
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-mybook
          hostPath:
            path: /mnt/MyBook500GB
        - name: host-passport
          hostPath:
            path: /mnt/Passport2TB
---
apiVersion: v1
kind: Service
metadata:
  name: nerv-dashboard-backend
  namespace: nerv-dashboard
spec:
  type: NodePort
  selector:
    app: nerv-dashboard-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30081
